<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img">
<title>World Bank Economic Intelligence Platform architecture</title>
<desc>Data flows from the World Bank API through ingestion, dbt transformation, and into PostgreSQL marts. From there, an embedding pipeline populates Qdrant for semantic search, while Redis caches metadata and conversation history. A FastAPI service routes natural language questions to SQL, semantic search, or both, calling a local LLaMA 3.1 model for answer generation. A Streamlit chat UI sits on top. Apache Airflow orchestrates the daily batch pipeline.</desc>

