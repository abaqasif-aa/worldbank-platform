services:

  postgres:
    image: postgres:15
    container_name: wb_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: wb_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: wb_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: wb_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow/artifacts
    environment:
      MLFLOW_BACKEND_STORE_URI: sqlite:////mlflow/artifacts/mlflow.db
      MLFLOW_DEFAULT_ARTIFACT_ROOT: /mlflow/artifacts
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlflow/artifacts/mlflow.db --default-artifact-root /mlflow/artifacts
    restart: unless-stopped

  airflow:
    image: apache/airflow:2.9.0
    container_name: wb_airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "worldbank-secret-key"
    ports:
      - "8080:8080"
    volumes:
      - ./services/airflow/dags:/opt/airflow/dags
      - ./services/airflow/entrypoint.sh:/opt/airflow/entrypoint.sh
      - airflow_logs:/opt/airflow/logs
    depends_on:
      postgres:
        condition: service_healthy
    command: bash -c "/opt/airflow/entrypoint.sh"
    restart: unless-stopped

  superset:
    image: apache/superset:latest
    container_name: wb_superset
    environment:
      SUPERSET_SECRET_KEY: "worldbank-superset-key"
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: admin
      SUPERSET_ADMIN_EMAIL: admin@example.com
      SUPERSET_LOAD_EXAMPLES: "no"
    ports:
      - "8088:8088"
    volumes:
      - superset_data:/app/superset_home
    depends_on:
      postgres:
        condition: service_healthy
    command: bash -c "pip install psycopg2-binary -q && superset db upgrade && superset fab create-admin --username=admin --firstname=Admin --lastname=Admin --email=admin@example.com --password=admin && superset init && superset run -h 0.0.0.0 -p 8088"
    restart: unless-stopped

  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: wb_jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./services/jupyter:/home/jovyan/work
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    command: start-notebook.sh --NotebookApp.token=''
    restart: unless-stopped

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: wb_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  ingestion:
      build:
        context: ./services/ingestion
        dockerfile: Dockerfile
      container_name: wb_ingestion
      profiles:
        - tasks
      env_file:
        - .env
      volumes:
        - ./data:/app/data
      depends_on:
        postgres:
          condition: service_healthy
  
  dbt:
    build:
      context: ./services/dbt
      dockerfile: Dockerfile
    container_name: wb_dbt
    profiles:
      - tasks
    env_file:
      - .env
    volumes:
      - ./services/dbt:/dbt
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  mlflow_data:
  airflow_logs:
  superset_data:
